<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闲鱼监控平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="login-page" class="page">
    <div class="login-card">
      <h1>📊 闲鱼监控平台</h1>
      <p class="subtitle">店铺上新 / 数据追踪 / 趋势分析</p>
      <div class="form-group">
        <input id="login-username" type="text" placeholder="用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <input id="login-password" type="password" placeholder="密码" autocomplete="current-password">
      </div>
      <button id="login-btn" class="btn btn-primary">登录</button>
      <div id="login-error" class="error-msg"></div>
    </div>
  </div>

  <div id="main-page" class="page" style="display:none">
    <nav>
      <div class="nav-brand">📊 闲鱼监控</div>
      <div class="nav-links">
        <a href="#" data-page="dashboard">仪表盘</a>
        <a href="#" data-page="monitors">监控管理</a>
        <a href="#" data-page="admin" id="admin-link" style="display:none">管理</a>
        <span id="nav-user" class="nav-user"></span>
        <a href="#" id="logout-btn">退出</a>
      </div>
    </nav>

    <main id="main-content">
      <!-- 仪表盘 -->
      <div id="page-dashboard" class="page-content">
        <h2>📈 总览</h2>
        <div class="stats-grid" id="dashboard-stats"></div>
        <div class="section">
          <h3>监控列表</h3>
          <div id="dashboard-monitors"></div>
        </div>
      </div>

      <!-- 监控管理 -->
      <div id="page-monitors" class="page-content" style="display:none">
        <div class="flex-row">
          <h2>🔍 监控管理</h2>
          <button id="add-monitor-btn" class="btn btn-primary">+ 新建监控</button>
        </div>
        <div id="add-monitor-form" class="add-form" style="display:none">
          <div class="mode-switch">
            <label><input type="radio" name="monitor-mode" value="keyword" checked onchange="toggleMonitorMode()"> 关键词</label>
            <label><input type="radio" name="monitor-mode" value="store" onchange="toggleMonitorMode()"> 店铺</label>
          </div>
          <div id="monitor-keyword-inputs">
            <input id="new-keyword" placeholder="监控关键词 (商品名/用户名)">
          </div>
          <div id="monitor-store-inputs" style="display:none">
            <input id="new-seed-item-id" placeholder="店铺任意商品ID (数字)">
            <span style="color:var(--sub);font-size:12px">例如商品链接 item?id=123456 中的数字</span>
          </div>
          <input id="new-interval" type="number" value="30" placeholder="间隔(分钟)" style="width:120px">
          <button id="save-monitor-btn" class="btn btn-primary">保存</button>
          <button id="cancel-monitor-btn" class="btn">取消</button>
        </div>
        <div id="monitors-list"></div>
      </div>

      <!-- 监控详情 -->
      <div id="page-monitor-detail" class="page-content" style="display:none">
        <button id="back-to-monitors" class="btn btn-back">← 返回</button>
        <div id="monitor-detail-header"></div>
        <div class="stats-grid" id="detail-stats"></div>
        <div class="table-toolbar">
          <input id="filter-input" placeholder="搜索商品...">
          <button id="refresh-check-btn" class="btn">🔄 手动检查</button>
          <a id="export-csv-link" class="btn" download>📥 导出CSV</a>
        </div>
        <div class="table-wrap">
          <table id="items-table">
            <thead>
              <tr>
                <th>标题</th><th>价格</th><th>👁浏览</th><th>❤️想要</th><th>⭐收藏</th><th>💬留言</th><th>📝评价</th><th>状态</th>
              </tr>
            </thead>
            <tbody id="items-tbody"></tbody>
          </table>
        </div>
        <div id="detail-changes" class="section"></div>
      </div>

      <!-- 商品详情 -->
      <div id="page-item-detail" class="page-content" style="display:none">
        <button id="back-to-monitor" class="btn btn-back">← 返回</button>
        <div id="item-detail-header"></div>
        <div class="chart-container">
          <canvas id="trend-chart"></canvas>
        </div>
        <div class="section" id="item-history-table"></div>
      </div>

      <!-- 管理后台 -->
      <div id="page-admin" class="page-content" style="display:none">
        <h2>⚙️ 系统管理</h2>
        <div class="stats-grid" id="admin-stats"></div>
        <div class="section">
          <h3>创建用户</h3>
          <div class="add-form">
            <input id="new-user-username" placeholder="用户名">
            <input id="new-user-password" type="password" placeholder="密码">
            <button id="create-user-btn" class="btn btn-primary">创建</button>
          </div>
          <div id="users-list"></div>
        </div>
        <div class="section">
          <h3>闲鱼登录状态</h3>
          <p id="xianyu-login-status">检查中...</p>
          <a href="/login-xianyu.html" class="btn" target="_blank">🔑 登录闲鱼</a>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
